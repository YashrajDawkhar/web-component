<section id="vsc-carousel" aria-labelledby="vsc-carousel-title">
  <style>
    #vsc-carousel, #vsc-carousel * { box-sizing: border-box; }
    #vsc-carousel { padding: var(--space-section-y) var(--space-page-x); background: var(--color-background); color: var(--color-on-surface); font-family: var(--font-sans); }
    #vsc-carousel .wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #vsc-carousel .head { display: flex; justify-content: space-between; gap: var(--space-md); margin-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline); padding-bottom: var(--space-md); }
    #vsc-carousel h2 { margin: 0; font-size: clamp(1.5rem, 3vw, 2.25rem); letter-spacing: -0.02em; }
    #vsc-carousel .rail { display: flex; gap: var(--space-sm); overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
    #vsc-carousel .rail::-webkit-scrollbar { display: none; }
    #vsc-carousel .card { flex: 0 0 min(72vw, 360px); scroll-snap-align: start; border: 1px solid var(--color-outline); border-radius: var(--radius-lg); overflow: hidden; background: var(--color-surface-container); }
    #vsc-carousel .media { aspect-ratio: 9/16; display: block; width: 100%; object-fit: cover; background: #000; }
    #vsc-carousel .body { padding: var(--space-sm); display: flex; align-items: center; justify-content: space-between; gap: var(--space-sm); }
    #vsc-carousel .title { font-size: .8125rem; color: var(--color-on-surface-variant); }
    #vsc-carousel .btn { border: 1px solid var(--color-outline); border-radius: var(--radius-full); background: transparent; color: var(--color-on-surface); min-width: 2rem; height: 2rem; cursor: pointer; }
    #vsc-carousel .btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  </style>

  <script>
    (function () {
      var rail = document.getElementById('vsc-rail');
      var prev = document.getElementById('vsc-prev');
      var next = document.getElementById('vsc-next');
      function step(dir) { rail.scrollBy({ left: dir * Math.min(360, rail.clientWidth * 0.8), behavior: 'smooth' }); }
      prev.addEventListener('click', function () { step(-1); });
      next.addEventListener('click', function () { step(1); });
    })();
  </script>
