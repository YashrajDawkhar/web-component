  <style>
    #vsc-marquee, #vsc-marquee * { box-sizing: border-box; }
    #vsc-marquee { padding: var(--space-section-y) 0; background: var(--color-background); color: var(--color-on-surface); font-family: var(--font-sans); overflow: hidden; }
    #vsc-marquee .head { max-width: var(--container-max-width); margin: 0 auto var(--space-md); padding: 0 var(--space-page-x); }
    #vsc-marquee h2 { margin: 0; font-size: clamp(1.5rem, 3vw, 2.3rem); }
    #vsc-marquee p { margin: var(--space-xs) 0 0; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
    #vsc-marquee .lane { display: flex; gap: var(--space-sm); width: max-content; animation: vsc-scroll 26s linear infinite; padding-bottom: var(--space-sm); }
    #vsc-marquee .lane.reverse { animation-direction: reverse; animation-duration: 32s; }
    #vsc-marquee .track { overflow: hidden; }
    #vsc-marquee .card { width: 190px; border: 1px solid var(--color-outline); border-radius: var(--radius-md); overflow: hidden; background: var(--color-surface-container); }
    #vsc-marquee video { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #000; display: block; }
    @keyframes vsc-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    @media (prefers-reduced-motion: reduce) { #vsc-marquee .lane { animation: none; } }
  </style>
