<link rel="stylesheet" href="../themes/supabase.css">

<section id="video-showcase-section" aria-labelledby="vshow-title">
  <style>
    #video-showcase-section,
    #video-showcase-section *,
    #video-showcase-section *::before,
    #video-showcase-section *::after { box-sizing: border-box; }

    #video-showcase-section {
      width: 100%;
      margin: 0;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    #video-showcase-section .vshow-wrap {
      max-width: var(--container-max-width);
      margin: 0 auto;
    }

    #video-showcase-section .vshow-head {
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--space-md);
      flex-wrap: wrap;
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--color-outline);
    }

    #video-showcase-section .vshow-eyebrow {
      margin: 0 0 var(--space-xs);
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    #vshow-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: var(--font-weight-bold);
      line-height: var(--line-height-tight);
      letter-spacing: -0.02em;
      color: var(--color-on-background);
    }

    #video-showcase-section .vshow-sub {
      margin: var(--space-xs) 0 0;
      max-width: 46ch;
      font-size: var(--font-size-body-sm);
      line-height: var(--line-height-body);
      color: var(--color-on-surface-variant);
    }

    #video-showcase-section .vshow-meta {
      display: inline-flex;
      gap: var(--space-sm);
      align-items: center;
      font-size: 0.75rem;
      color: var(--color-on-surface-variant);
      font-variant-numeric: tabular-nums;
    }

    #video-showcase-section .vshow-meta strong {
      color: var(--color-on-surface);
      font-weight: var(--font-weight-bold);
    }

    #video-showcase-section .vshow-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-sm);
    }

    @media (min-width: 720px) {
      #video-showcase-section .vshow-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); }
    }
    @media (min-width: 1024px) {
      #video-showcase-section .vshow-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    #video-showcase-section .vshow-card {
      position: relative;
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-lg);
      background: var(--color-surface-container);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 0;
      transition: border-color var(--duration-medium) var(--ease-standard);
      isolation: isolate;
    }

    #video-showcase-section .vshow-card:hover {
      border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline));
    }

    #video-showcase-section .vshow-media {
      position: relative;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: #000;
      display: block;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #video-showcase-section .vshow-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 600ms var(--ease-standard);
    }

    @media (hover: hover) {
      #video-showcase-section .vshow-card:hover .vshow-media video {
        transform: scale(1.03);
      }
    }

    #video-showcase-section .vshow-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.44), rgba(0, 0, 0, 0.08) 54%, rgba(0, 0, 0, 0.22));
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--duration-medium) var(--ease-standard);
      pointer-events: none;
      z-index: 2;
    }

    #video-showcase-section .vshow-card.is-playing .vshow-overlay {
      opacity: 0;
    }

    #video-showcase-section .vshow-play {
      width: 3.25rem;
      height: 3.25rem;
      border-radius: var(--radius-full);
      border: 1px solid color-mix(in srgb, var(--color-outline) 70%, transparent);
      background: color-mix(in srgb, var(--color-background) 78%, transparent);
      backdrop-filter: blur(6px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--color-on-surface);
      box-shadow: var(--shadow-sm);
      transition: transform var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard), border-color var(--duration-medium) var(--ease-standard);
    }

    #video-showcase-section .vshow-play svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: currentColor;
      margin-left: 2px;
    }

    #video-showcase-section .vshow-card:hover .vshow-play {
      color: var(--color-primary);
      border-color: color-mix(in srgb, var(--color-primary) 40%, var(--color-outline));
      transform: scale(1.04);
    }

    #video-showcase-section .vshow-foot {
      position: absolute;
      left: var(--space-sm);
      right: var(--space-sm);
      bottom: var(--space-sm);
      z-index: 3;
    }

    #video-showcase-section .vshow-shop {
      width: 100%;
      min-height: 2.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-outline);
      background: color-mix(in srgb, var(--color-background) 86%, transparent);
      color: var(--color-on-surface);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard), border-color var(--duration-medium) var(--ease-standard);
    }

    #video-showcase-section .vshow-shop:hover {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-on-primary);
    }

    #video-showcase-section .vshow-shop:focus-visible,
    #video-showcase-section .vshow-media:focus-visible {
      outline: var(--focus-ring-width) solid var(--focus-ring-color);
      outline-offset: 3px;
    }

    #video-showcase-section .vshow-scroll {
      display: none;
      margin-top: var(--space-sm);
      justify-content: center;
      font-size: 0.6875rem;
      color: var(--color-on-surface-variant);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      #video-showcase-section {
        padding-left: 0;
        padding-right: 0;
      }

      #video-showcase-section .vshow-head {
        margin-left: var(--space-page-x);
        margin-right: var(--space-page-x);
      }

      #video-showcase-section .vshow-grid {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        gap: var(--space-sm);
        padding: 0 var(--space-page-x) var(--space-sm);
        scrollbar-width: none;
      }

      #video-showcase-section .vshow-grid::-webkit-scrollbar { display: none; }

      #video-showcase-section .vshow-card {
        flex: 0 0 82%;
        scroll-snap-align: center;
      }

      #video-showcase-section .vshow-scroll { display: flex; }
    }

    @media (prefers-reduced-motion: reduce) {
      #video-showcase-section *,
      #video-showcase-section *::before,
      #video-showcase-section *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <script>
    (function () {
      var root = document.getElementById('video-showcase-section');
      if (!root) return;

      var cards = root.querySelectorAll('.vshow-card');
      var count = root.querySelector('#vshow-count');
      if (count) count.textContent = cards.length;

      function pauseAll(except) {
        cards.forEach(function (card) {
          if (card === except) return;
          var otherVid = card.querySelector('video');
          if (otherVid) otherVid.pause();
          card.classList.remove('is-playing');
        });
      }

      cards.forEach(function (card) {
        var video = card.querySelector('video');
        var mediaBtn = card.querySelector('.vshow-media');
        if (!video || !mediaBtn) return;

        mediaBtn.addEventListener('click', function () {
          if (video.paused) {
            pauseAll(card);
            video.play().then(function () {
              card.classList.add('is-playing');
            }).catch(function () { });
            return;
          }
          video.pause();
          card.classList.remove('is-playing');
        });

        card.addEventListener('mouseenter', function () {
          if (window.innerWidth <= 640 || !video.paused) return;
          pauseAll(card);
          video.play().then(function () {
            card.classList.add('is-playing');
          }).catch(function () { });
        });

        card.addEventListener('mouseleave', function () {
          if (window.innerWidth <= 640 || video.paused) return;
          video.pause();
          card.classList.remove('is-playing');
        });
      });

      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) return;
            var v = entry.target.querySelector('video');
            if (!v) return;
            v.pause();
            entry.target.classList.remove('is-playing');
          });
        }, { threshold: 0.5 });

        cards.forEach(function (card) { observer.observe(card); });
      }
    })();
  </script>
