<link rel="stylesheet" href="../themes/supabase.css">

<section id="vsc-tabs" aria-labelledby="vsc-tabs-title">
  <style>
    #vsc-tabs, #vsc-tabs * { box-sizing: border-box; }
    #vsc-tabs { padding: var(--space-section-y) var(--space-page-x); background: var(--color-background); color: var(--color-on-surface); font-family: var(--font-sans); }
    #vsc-tabs .wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #vsc-tabs h2 { margin: 0 0 var(--space-md); font-size: clamp(1.5rem, 3vw, 2.25rem); }
    #vsc-tabs .tabs { display: flex; gap: var(--space-xs); margin-bottom: var(--space-md); flex-wrap: wrap; }
    #vsc-tabs .tab { border: 1px solid var(--color-outline); background: transparent; color: var(--color-on-surface); border-radius: var(--radius-full); padding: 8px 14px; cursor: pointer; font: inherit; font-size: .8125rem; }
    #vsc-tabs .tab.active { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); }
    #vsc-tabs .grid { display: grid; gap: var(--space-sm); grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (min-width: 900px) { #vsc-tabs .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: var(--space-md); } }
    #vsc-tabs .card { border: 1px solid var(--color-outline); border-radius: var(--radius-lg); overflow: hidden; background: var(--color-surface-container); }
    #vsc-tabs video { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; background: #000; }
    #vsc-tabs .body { padding: var(--space-sm); display: flex; justify-content: space-between; gap: var(--space-sm); font-size: .8125rem; color: var(--color-on-surface-variant); }
  </style>
  <div class="wrap">

  <script>
    (function () {
      var tabs = document.querySelectorAll('#vsc-tabs .tab');
      var cards = document.querySelectorAll('#vsc-tabs .card');
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          var cat = tab.getAttribute('data-cat');
          tabs.forEach(function (t) { t.classList.toggle('active', t === tab); });
          cards.forEach(function (c) {
            var show = cat === 'all' || c.getAttribute('data-cat') === cat;
            c.style.display = show ? '' : 'none';
          });
        });
      });
    })();
  </script>
