<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll" aria-labelledby="ab-coll-title">
  <style>
    #ab-coll,
    #ab-coll *,
    #ab-coll *::before,
    #ab-coll *::after { box-sizing: border-box; }

    #ab-coll {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }

    #ab-coll .ab-wrap {
      max-width: var(--container-max-width);
      margin: 0 auto;
    }

    /* ---------- Header ---------- */
    #ab-coll .ab-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--color-outline);
    }

    #ab-coll .ab-eyebrow {
      display: inline-block;
      margin: 0 0 var(--space-xs);
      font-size: 0.6875rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    #ab-coll-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.02em;
      line-height: var(--line-height-tight);
      color: var(--color-on-background);
    }

    #ab-coll .ab-sub {
      margin: var(--space-xs) 0 0;
      max-width: 40rem;
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
      line-height: var(--line-height-body);
    }

    #ab-coll .ab-utils {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    #ab-coll .ab-count {
      font-size: 0.75rem;
      color: var(--color-on-surface-variant);
      font-variant-numeric: tabular-nums;
    }

    #ab-coll .ab-count strong {
      color: var(--color-on-surface);
      font-weight: var(--font-weight-bold);
    }

    /* ---------- Grid ---------- */
    #ab-coll .ab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-sm);
      row-gap: var(--space-lg);
    }

    @media (min-width: 640px) {
      #ab-coll .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); row-gap: var(--space-lg); }
    }
    @media (min-width: 960px) {
      #ab-coll .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    /* ---------- Card ---------- */
    #ab-coll .ab-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #ab-coll .ab-media {
      position: relative;
      display: block;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: var(--color-surface-container);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }

    #ab-coll .ab-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 600ms var(--ease-standard);
    }

    #ab-coll .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll .ab-card:hover .ab-media img { transform: scale(1.04); }

    #ab-coll .ab-tags {
      position: absolute;
      top: var(--space-sm);
      left: var(--space-sm);
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    #ab-coll .ab-tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      border-radius: var(--radius-sm);
      font-size: 0.625rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
    }

    #ab-coll .ab-tag--sale {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }

    #ab-coll .ab-tag--soldout {
      background: var(--color-surface-container-high);
      color: var(--color-on-surface-variant);
      border: 1px solid var(--color-outline);
    }

    #ab-coll .ab-fav {
      position: absolute;
      top: var(--space-sm);
      right: var(--space-sm);
      width: 2rem;
      height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-outline);
      background: color-mix(in srgb, var(--color-background) 75%, transparent);
      backdrop-filter: blur(8px);
      color: var(--color-on-surface);
      cursor: pointer;
      transition: color var(--duration-medium) var(--ease-standard), background var(--duration-medium) var(--ease-standard);
    }

    #ab-coll .ab-fav:hover { color: var(--color-primary); }
    #ab-coll .ab-fav.on { color: var(--color-primary); }
    #ab-coll .ab-fav.on svg { fill: currentColor; }
    #ab-coll .ab-fav svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    #ab-coll .ab-quick {
      position: absolute;
      left: var(--space-sm);
      right: var(--space-sm);
      bottom: var(--space-sm);
      display: flex;
      gap: var(--space-xs);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--duration-medium) var(--ease-standard), transform var(--duration-medium) var(--ease-standard);
      pointer-events: none;
    }

    @media (hover: hover) {
      #ab-coll .ab-card:hover .ab-quick {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
    }

    @media (hover: none) {
      #ab-coll .ab-quick { opacity: 1; transform: none; pointer-events: auto; }
    }

    #ab-coll .ab-add {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      border: none;
      border-radius: var(--radius-full);
      background: var(--color-on-surface);
      color: var(--color-background);
      font: inherit;
      font-size: 0.8125rem;
      font-weight: var(--font-weight-bold);
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }

    #ab-coll .ab-add:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll .ab-add[aria-disabled="true"] { opacity: 0.5; pointer-events: none; }

    /* ---------- Body ---------- */
    #ab-coll .ab-body {
      padding-top: var(--space-sm);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #ab-coll .ab-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--color-on-surface);
      text-decoration: none;
      font-size: var(--font-size-body-sm);
      font-weight: var(--font-weight-medium);
      line-height: 1.35;
    }

    #ab-coll .ab-name:hover { color: var(--color-primary); }

    #ab-coll .ab-prices {
      display: flex;
      align-items: baseline;
      gap: var(--space-xs);
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    #ab-coll .ab-price {
      color: var(--color-on-surface);
      font-size: var(--font-size-body-sm);
      font-weight: var(--font-weight-bold);
    }

    #ab-coll .ab-old {
      color: var(--color-on-surface-variant);
      font-size: 0.75rem;
      text-decoration: line-through;
    }

    #ab-coll .ab-pct {
      color: var(--color-primary);
      font-size: 0.6875rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.04em;
    }

    /* ---------- States ---------- */
    #ab-coll .ab-status {
      grid-column: 1 / -1;
      padding: var(--space-xl) var(--space-md);
      text-align: center;
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
    }

    #ab-coll .ab-skeleton {
      aspect-ratio: 4 / 5;
      border-radius: var(--radius-lg);
      background: linear-gradient(90deg,
        var(--color-surface-container) 0%,
        var(--color-surface-container-high) 50%,
        var(--color-surface-container) 100%);
      background-size: 200% 100%;
      animation: ab-shimmer 1.4s linear infinite;
    }

    @keyframes ab-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      #ab-coll .ab-media img,
      #ab-coll .ab-quick { transition: none; }
      #ab-coll .ab-skeleton { animation: none; }
    }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Curated</span>
        <h2 id="ab-coll-title">Sale picks</h2>
        <p class="ab-sub">Top discounted essentials — limited-time deals updated from the live collection.</p>
      </div>
      <div class="ab-utils">
        <span class="ab-count" aria-live="polite"><strong>—</strong> products</span>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-grid"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-grid');
      var countEl = root.querySelector('.ab-count strong');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';

      function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      function fmt(v) {
        var n = typeof v === 'number' ? v : parseFloat(v);
        if (!Number.isFinite(n)) return '';
        return '₹' + n.toLocaleString('en-IN');
      }

      function skeletons(n) {
        var s = '';
        for (var i = 0; i < n; i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>';
        return s;
      }
      grid.innerHTML = skeletons(8);

      function cardHTML(product) {
        var v = product.variants && product.variants[0];
        if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = product.images && product.images[0] ? (product.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(product.title || '');
        var handle = product.handle || '';
        var available = product.available !== false;
        var pUrl = 'https://' + DOMAIN + '/products/' + handle;
        var bUrl = 'https://' + DOMAIN + '/cart/' + v.id + ':1';

        var tags = '';
        var oldHtml = '';
        var pct = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tags += '<span class="ab-tag ab-tag--sale">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
          pct = '<span class="ab-pct">Save ' + d + '%</span>';
        }
        if (!available) tags += '<span class="ab-tag ab-tag--soldout">Sold out</span>';

        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     '<div class="ab-tags">' + tags + '</div>'
          +     '<button class="ab-fav" type="button" aria-label="Save for later" onclick="event.preventDefault();this.classList.toggle(\'on\');">'
          +       '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
          +     '</button>'
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +     '<div class="ab-quick">'
          +       '<a class="ab-add" href="' + bUrl + '"' + (available ? '' : ' aria-disabled="true" tabindex="-1"') + '>' + (available ? 'Add to bag' : 'Unavailable') + '</a>'
          +     '</div>'
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices">'
          +       '<span class="ab-price">' + (fmt(price) || '₹—') + '</span>'
          +       oldHtml
          +       pct
          +     '</div>'
          +   '</div>'
          + '</article>';
      }

      fetch(API)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var products = (data && data.products) ? data.products : [];
          if (!products.length) {
            grid.innerHTML = '<div class="ab-status">No products found</div>';
            countEl.textContent = '0';
            return;
          }
          grid.innerHTML = products.map(cardHTML).join('');
          countEl.textContent = products.length;
        })
        .catch(function () {
          grid.innerHTML = '<div class="ab-status">Couldn\'t load products. Please try again.</div>';
        });
    })();
  </script>
</section>
