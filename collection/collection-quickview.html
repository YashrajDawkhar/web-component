<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-qv" aria-labelledby="ab-coll-qv-title">
  <style>
    #ab-coll-qv,
    #ab-coll-qv *,
    #ab-coll-qv *::before,
    #ab-coll-qv *::after { box-sizing: border-box; }

    #ab-coll-qv {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-qv .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #ab-coll-qv .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-qv .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-qv-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-qv .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-qv .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-qv .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 960px) { #ab-coll-qv .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    #ab-coll-qv .ab-card { display: flex; flex-direction: column; min-width: 0; }
    #ab-coll-qv .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-qv .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-qv .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-qv .ab-card:hover .ab-media img { transform: scale(1.04); }
    #ab-coll-qv .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }

    #ab-coll-qv .ab-quick {
      position: absolute; left: var(--space-sm); right: var(--space-sm); bottom: var(--space-sm);
      display: flex; gap: var(--space-xs);
      opacity: 0; transform: translateY(8px);
      transition: opacity var(--duration-medium) var(--ease-standard), transform var(--duration-medium) var(--ease-standard);
      pointer-events: none;
    }
    @media (hover: hover) { #ab-coll-qv .ab-card:hover .ab-quick { opacity: 1; transform: translateY(0); pointer-events: auto; } }
    @media (hover: none) { #ab-coll-qv .ab-quick { opacity: 1; transform: none; pointer-events: auto; } }

    #ab-coll-qv .ab-qbtn {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      border: none; border-radius: var(--radius-full);
      background: var(--color-on-surface); color: var(--color-background);
      font: inherit; font-size: 0.8125rem; font-weight: var(--font-weight-bold);
      cursor: pointer; text-align: center;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-qv .ab-qbtn:hover { background: var(--color-primary); color: var(--color-on-primary); }

    #ab-coll-qv .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-qv .ab-name { color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ab-coll-qv .ab-name:hover { color: var(--color-primary); }
    #ab-coll-qv .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-qv .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-qv .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }
    #ab-coll-qv .ab-pct { color: var(--color-primary); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.04em; }

    #ab-coll-qv .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #ab-coll-qv .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }

    /* Modal */
    #ab-coll-qv .ab-modal {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      padding: var(--space-md);
    }
    #ab-coll-qv .ab-modal.open { display: flex; }
    #ab-coll-qv .ab-scrim {
      position: absolute; inset: 0;
      background: var(--color-scrim);
      animation: ab-fadeIn .2s var(--ease-standard) both;
    }
    #ab-coll-qv .ab-dialog {
      position: relative;
      width: 100%; max-width: 56rem; max-height: 90vh;
      overflow: hidden;
      background: var(--color-surface-container-lowest);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      display: grid; grid-template-columns: 1fr;
      animation: ab-pop .3s var(--ease-standard) both;
    }
    @media (min-width: 760px) {
      #ab-coll-qv .ab-dialog { grid-template-columns: 1.1fr 1fr; max-height: 80vh; }
    }
    @keyframes ab-fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ab-pop { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

    #ab-coll-qv .ab-dimg {
      background: var(--color-surface-container);
      aspect-ratio: 4/5;
      overflow: hidden;
      max-height: 60vh;
    }
    @media (min-width: 760px) { #ab-coll-qv .ab-dimg { aspect-ratio: auto; height: 100%; max-height: none; } }
    #ab-coll-qv .ab-dimg img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #ab-coll-qv .ab-dbody {
      padding: var(--space-lg);
      display: flex; flex-direction: column; gap: var(--space-sm);
      overflow-y: auto;
    }

    #ab-coll-qv .ab-dclose {
      position: absolute; top: var(--space-sm); right: var(--space-sm); z-index: 2;
      width: 2.25rem; height: 2.25rem;
      border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      border-radius: var(--radius-full);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #ab-coll-qv .ab-dclose:hover { background: var(--color-surface-container); }
    #ab-coll-qv .ab-dclose svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    #ab-coll-qv .ab-dtag {
      align-self: flex-start;
      padding: 3px 8px; border-radius: var(--radius-sm);
      background: var(--color-primary); color: var(--color-on-primary);
      font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase;
    }
    #ab-coll-qv .ab-dname {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.01em;
      line-height: var(--line-height-tight);
      color: var(--color-on-background);
    }
    #ab-coll-qv .ab-dprices { display: flex; align-items: baseline; gap: var(--space-sm); font-variant-numeric: tabular-nums; }
    #ab-coll-qv .ab-dprice { font-size: 1.25rem; font-weight: var(--font-weight-bold); }
    #ab-coll-qv .ab-dold { color: var(--color-on-surface-variant); text-decoration: line-through; }
    #ab-coll-qv .ab-dpct { color: var(--color-primary); font-weight: var(--font-weight-bold); font-size: 0.875rem; }
    #ab-coll-qv .ab-ddesc { color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-qv .ab-doptions { display: flex; flex-direction: column; gap: var(--space-sm); margin-top: var(--space-xs); }
    #ab-coll-qv .ab-doption-label { font-size: 0.75rem; color: var(--color-on-surface-variant); letter-spacing: 0.04em; text-transform: uppercase; font-weight: var(--font-weight-bold); }
    #ab-coll-qv .ab-doption-row { display: flex; gap: var(--space-xs); flex-wrap: wrap; }
    #ab-coll-qv .ab-doption {
      padding: 6px 12px; border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest); color: var(--color-on-surface);
      font: inherit; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium);
      border-radius: var(--radius-md); cursor: pointer;
    }
    #ab-coll-qv .ab-doption[aria-pressed="true"] { background: var(--color-on-surface); color: var(--color-background); border-color: var(--color-on-surface); }

    #ab-coll-qv .ab-dactions { display: flex; gap: var(--space-sm); margin-top: var(--space-sm); }
    #ab-coll-qv .ab-dadd {
      flex: 1; padding: var(--space-sm) var(--space-md);
      background: var(--color-on-surface); color: var(--color-background);
      border: none; border-radius: var(--radius-full);
      font: inherit; font-size: 0.875rem; font-weight: var(--font-weight-bold);
      cursor: pointer; text-decoration: none; text-align: center;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-qv .ab-dadd:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-qv .ab-dview {
      flex: 0 0 auto; padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--color-outline);
      background: transparent; color: var(--color-on-surface);
      border-radius: var(--radius-full);
      font: inherit; font-size: 0.875rem; font-weight: var(--font-weight-bold);
      text-decoration: none; text-align: center;
    }
    #ab-coll-qv .ab-dview:hover { background: var(--color-surface-container); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Quick view</span>
        <h2 id="ab-coll-qv-title">Sale picks</h2>
        <p class="ab-sub">Hover any card and tap "Quick view" to peek without leaving the page.</p>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-qv-grid"></div>
  </div>

  <div class="ab-modal" id="ab-coll-qv-modal" role="dialog" aria-modal="true" aria-labelledby="ab-coll-qv-modal-title" hidden>
    <div class="ab-scrim" data-close></div>
    <div class="ab-dialog">
      <button class="ab-dclose" type="button" aria-label="Close" data-close><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="ab-dimg" id="ab-coll-qv-dimg"></div>
      <div class="ab-dbody">
        <span class="ab-dtag" id="ab-coll-qv-dtag" hidden></span>
        <h3 class="ab-dname" id="ab-coll-qv-modal-title">—</h3>
        <div class="ab-dprices">
          <span class="ab-dprice" id="ab-coll-qv-dprice">₹—</span>
          <span class="ab-dold" id="ab-coll-qv-dold" hidden></span>
          <span class="ab-dpct" id="ab-coll-qv-dpct" hidden></span>
        </div>
        <p class="ab-ddesc" id="ab-coll-qv-ddesc">—</p>
        <div class="ab-doptions">
          <div>
            <div class="ab-doption-label">Size</div>
            <div class="ab-doption-row">
              <button type="button" class="ab-doption" aria-pressed="false">XS</button>
              <button type="button" class="ab-doption" aria-pressed="true">S</button>
              <button type="button" class="ab-doption" aria-pressed="false">M</button>
              <button type="button" class="ab-doption" aria-pressed="false">L</button>
              <button type="button" class="ab-doption" aria-pressed="false">XL</button>
            </div>
          </div>
        </div>
        <div class="ab-dactions">
          <a href="#" class="ab-dadd" id="ab-coll-qv-dadd">Add to bag</a>
          <a href="#" class="ab-dview" id="ab-coll-qv-dview">View product</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-qv');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-qv-grid');
      var modal = root.querySelector('#ab-coll-qv-modal');
      var dimg = root.querySelector('#ab-coll-qv-dimg');
      var dname = root.querySelector('#ab-coll-qv-modal-title');
      var dprice = root.querySelector('#ab-coll-qv-dprice');
      var dold = root.querySelector('#ab-coll-qv-dold');
      var dpct = root.querySelector('#ab-coll-qv-dpct');
      var dtag = root.querySelector('#ab-coll-qv-dtag');
      var ddesc = root.querySelector('#ab-coll-qv-ddesc');
      var dadd = root.querySelector('#ab-coll-qv-dadd');
      var dview = root.querySelector('#ab-coll-qv-dview');
      var sizeBtns = root.querySelectorAll('.ab-doption');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';

      var products = [];

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }
      grid.innerHTML = skel(8);

      function cardHTML(p, idx) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '', pct = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
          pct = '<span class="ab-pct">Save ' + d + '%</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +     '<div class="ab-quick"><button class="ab-qbtn" type="button" data-qv="' + idx + '">Quick view</button></div>'
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + pct + '</div>'
          +   '</div>'
          + '</article>';
      }

      function openQV(p) {
        var v = p.variants && p.variants[0]; if (!v) return;
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');

        dimg.innerHTML = img ? '<img src="' + img + '" alt="' + title + '">' : '';
        dname.innerHTML = title;
        dprice.textContent = fmt(price) || '₹—';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          dold.textContent = fmt(compare); dold.hidden = false;
          dpct.textContent = 'Save ' + d + '%'; dpct.hidden = false;
          dtag.textContent = '−' + d + '% Sale'; dtag.hidden = false;
        } else { dold.hidden = true; dpct.hidden = true; dtag.hidden = true; }

        var desc = (p.body_html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        ddesc.textContent = desc ? desc.slice(0, 240) + (desc.length > 240 ? '…' : '') : 'No description available.';

        dview.href = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        dadd.href = 'https://' + DOMAIN + '/cart/' + v.id + ':1';

        modal.classList.add('open');
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
      }

      function closeQV() {
        modal.classList.remove('open');
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      modal.addEventListener('click', function (e) {
        if (e.target.closest('[data-close]')) closeQV();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('open')) closeQV();
      });

      sizeBtns.forEach(function (b) {
        b.addEventListener('click', function () {
          sizeBtns.forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
          b.setAttribute('aria-pressed', 'true');
        });
      });

      grid.addEventListener('click', function (e) {
        var t = e.target.closest('[data-qv]');
        if (!t) return;
        e.preventDefault();
        var idx = parseInt(t.getAttribute('data-qv'), 10);
        var p = products[idx];
        if (p) openQV(p);
      });

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        grid.innerHTML = products.map(cardHTML).join('');
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
