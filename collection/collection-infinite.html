<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-if" aria-labelledby="ab-coll-if-title">
  <style>
    #ab-coll-if,
    #ab-coll-if *,
    #ab-coll-if *::before,
    #ab-coll-if *::after { box-sizing: border-box; }

    #ab-coll-if {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-if .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #ab-coll-if .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-if .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-if-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-if .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-if .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-if .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 960px) { #ab-coll-if .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    #ab-coll-if .ab-card { display: flex; flex-direction: column; min-width: 0; animation: ab-fadeIn .35s var(--ease-standard) both; }
    @keyframes ab-fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    #ab-coll-if .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-if .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-if .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-if .ab-card:hover .ab-media img { transform: scale(1.04); }
    #ab-coll-if .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }
    #ab-coll-if .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-if .ab-name { color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ab-coll-if .ab-name:hover { color: var(--color-primary); }
    #ab-coll-if .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-if .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-if .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }

    #ab-coll-if .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ab-coll-if .ab-sentinel {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-xl) var(--space-md);
      gap: var(--space-sm);
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
    }

    #ab-coll-if .ab-spinner {
      width: 1rem; height: 1rem;
      border: 2px solid var(--color-outline);
      border-top-color: var(--color-primary);
      border-radius: var(--radius-full);
      animation: ab-spin 0.8s linear infinite;
    }
    @keyframes ab-spin { to { transform: rotate(360deg); } }

    #ab-coll-if .ab-end {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
      border-top: 1px solid var(--color-outline);
      margin-top: var(--space-md);
    }
    #ab-coll-if .ab-end strong { display: block; color: var(--color-on-surface); font-weight: var(--font-weight-bold); margin-bottom: 4px; }

    #ab-coll-if .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Endless</span>
        <h2 id="ab-coll-if-title">Sale picks</h2>
        <p class="ab-sub">Just keep scrolling — new products load automatically as you reach the bottom.</p>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-if-grid"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-if');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-if-grid');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';
      var BATCH = 8;

      var all = [];
      var shown = 0;
      var sentinel = null;
      var observer = null;

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }
      grid.innerHTML = skel(BATCH);

      function cardHTML(p) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + '</div>'
          +   '</div>'
          + '</article>';
      }

      function setSentinel() {
        if (sentinel) sentinel.remove();
        if (shown >= all.length) {
          var end = document.createElement('div');
          end.className = 'ab-end';
          end.innerHTML = '<strong>You\'ve reached the end</strong>That\'s every sale pick we have — for now.';
          grid.appendChild(end);
          if (observer) observer.disconnect();
          return;
        }
        sentinel = document.createElement('div');
        sentinel.className = 'ab-sentinel';
        sentinel.innerHTML = '<span class="ab-spinner" aria-hidden="true"></span> Loading more…';
        grid.appendChild(sentinel);
        if (observer) observer.observe(sentinel);
      }

      function appendBatch() {
        var next = all.slice(shown, shown + BATCH);
        if (!next.length) { setSentinel(); return; }
        var html = next.map(cardHTML).join('');
        if (sentinel) sentinel.insertAdjacentHTML('beforebegin', html);
        else grid.insertAdjacentHTML('beforeend', html);
        shown += next.length;
        setSentinel();
      }

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        // Inflate the dataset to demo infinite scroll
        all = products.concat(products).concat(products);
        grid.innerHTML = '';
        if ('IntersectionObserver' in window) {
          observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
              if (e.isIntersecting) {
                setTimeout(appendBatch, 200);
              }
            });
          }, { rootMargin: '300px 0px' });
        }
        appendBatch();
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
