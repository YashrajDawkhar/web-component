<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-dr" aria-labelledby="ab-coll-dr-title">
  <style>
    #ab-coll-dr,
    #ab-coll-dr *,
    #ab-coll-dr *::before,
    #ab-coll-dr *::after { box-sizing: border-box; }

    #ab-coll-dr {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-dr .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #ab-coll-dr .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-dr .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-dr-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-dr .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-dr .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-dr .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 960px) { #ab-coll-dr .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    #ab-coll-dr .ab-card { display: flex; flex-direction: column; min-width: 0; }
    #ab-coll-dr .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-dr .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-dr .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-dr .ab-card:hover .ab-media img { transform: scale(1.04); }
    #ab-coll-dr .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }

    #ab-coll-dr .ab-quick {
      position: absolute; left: var(--space-sm); right: var(--space-sm); bottom: var(--space-sm);
      display: flex;
      opacity: 0; transform: translateY(8px);
      transition: opacity var(--duration-medium) var(--ease-standard), transform var(--duration-medium) var(--ease-standard);
      pointer-events: none;
    }
    @media (hover: hover) { #ab-coll-dr .ab-card:hover .ab-quick { opacity: 1; transform: translateY(0); pointer-events: auto; } }
    @media (hover: none) { #ab-coll-dr .ab-quick { opacity: 1; transform: none; pointer-events: auto; } }

    #ab-coll-dr .ab-qbtn {
      flex: 1;
      padding: var(--space-sm) var(--space-md);
      border: none; border-radius: var(--radius-full);
      background: var(--color-on-surface); color: var(--color-background);
      font: inherit; font-size: 0.8125rem; font-weight: var(--font-weight-bold);
      cursor: pointer; text-align: center;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-dr .ab-qbtn:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-dr .ab-qbtn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    #ab-coll-dr .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-dr .ab-name { color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ab-coll-dr .ab-name:hover { color: var(--color-primary); }
    #ab-coll-dr .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-dr .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-dr .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }

    #ab-coll-dr .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #ab-coll-dr .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }

    /* Drawer */
    #ab-coll-dr .ab-dwrap {
      position: fixed; inset: 0;
      z-index: 1000;
      pointer-events: none;
    }
    #ab-coll-dr .ab-dwrap.open { pointer-events: auto; }

    #ab-coll-dr .ab-scrim {
      position: absolute; inset: 0;
      background: var(--color-scrim);
      opacity: 0;
      transition: opacity var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-dr .ab-dwrap.open .ab-scrim { opacity: 1; }

    #ab-coll-dr .ab-drawer {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: min(100%, 28rem);
      background: var(--color-surface-container-lowest);
      border-left: 1px solid var(--color-outline);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform var(--duration-medium) var(--ease-standard);
      display: flex; flex-direction: column;
    }
    #ab-coll-dr .ab-dwrap.open .ab-drawer { transform: translateX(0); }

    #ab-coll-dr .ab-dhead {
      flex-shrink: 0;
      padding: var(--space-md);
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-dr .ab-dhead h3 {
      margin: 0;
      font-size: 0.75rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-on-surface-variant);
    }
    #ab-coll-dr .ab-dclose {
      width: 2rem; height: 2rem;
      border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      border-radius: var(--radius-full);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #ab-coll-dr .ab-dclose:hover { background: var(--color-surface-container); }
    #ab-coll-dr .ab-dclose svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    #ab-coll-dr .ab-dbody { flex: 1; overflow-y: auto; padding: var(--space-md); display: flex; flex-direction: column; gap: var(--space-md); }
    #ab-coll-dr .ab-dimg {
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: var(--color-surface-container);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-md);
    }
    #ab-coll-dr .ab-dimg img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #ab-coll-dr .ab-dtag {
      align-self: flex-start;
      padding: 3px 8px; border-radius: var(--radius-sm);
      background: var(--color-primary); color: var(--color-on-primary);
      font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase;
    }
    #ab-coll-dr .ab-dname {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.01em;
      line-height: var(--line-height-tight);
      color: var(--color-on-background);
    }
    #ab-coll-dr .ab-dprices { display: flex; align-items: baseline; gap: var(--space-sm); font-variant-numeric: tabular-nums; }
    #ab-coll-dr .ab-dprice { font-size: 1.125rem; font-weight: var(--font-weight-bold); }
    #ab-coll-dr .ab-dold { color: var(--color-on-surface-variant); text-decoration: line-through; font-size: 0.875rem; }
    #ab-coll-dr .ab-dpct { color: var(--color-primary); font-weight: var(--font-weight-bold); font-size: 0.8125rem; }
    #ab-coll-dr .ab-ddesc { color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); margin: 0; }

    #ab-coll-dr .ab-doption-label { font-size: 0.6875rem; color: var(--color-on-surface-variant); letter-spacing: 0.08em; text-transform: uppercase; font-weight: var(--font-weight-bold); margin-bottom: 6px; }
    #ab-coll-dr .ab-doption-row { display: flex; gap: var(--space-xs); flex-wrap: wrap; }
    #ab-coll-dr .ab-doption {
      padding: 6px 12px; border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest); color: var(--color-on-surface);
      font: inherit; font-size: 0.8125rem; font-weight: var(--font-weight-medium);
      border-radius: var(--radius-md); cursor: pointer;
    }
    #ab-coll-dr .ab-doption[aria-pressed="true"] { background: var(--color-on-surface); color: var(--color-background); border-color: var(--color-on-surface); }

    #ab-coll-dr .ab-dfoot {
      flex-shrink: 0;
      padding: var(--space-md);
      border-top: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest);
      display: flex;
      gap: var(--space-sm);
    }
    #ab-coll-dr .ab-dadd {
      flex: 1; padding: var(--space-sm) var(--space-md);
      background: var(--color-on-surface); color: var(--color-background);
      border: none; border-radius: var(--radius-full);
      font: inherit; font-size: 0.875rem; font-weight: var(--font-weight-bold);
      cursor: pointer; text-decoration: none; text-align: center;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-dr .ab-dadd:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-dr .ab-dview {
      flex: 0 0 auto; padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--color-outline);
      background: transparent; color: var(--color-on-surface);
      border-radius: var(--radius-full);
      font: inherit; font-size: 0.875rem; font-weight: var(--font-weight-bold);
      text-decoration: none;
    }
    #ab-coll-dr .ab-dview:hover { background: var(--color-surface-container); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Drawer preview</span>
        <h2 id="ab-coll-dr-title">Sale picks</h2>
        <p class="ab-sub">Quick view slides in from the side — keeps the grid visible while you peek.</p>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-dr-grid"></div>
  </div>

  <div class="ab-dwrap" id="ab-coll-dr-dwrap" role="dialog" aria-modal="true" aria-labelledby="ab-coll-dr-dname">
    <div class="ab-scrim" data-close></div>
    <aside class="ab-drawer" aria-label="Quick view">
      <header class="ab-dhead">
        <h3>Quick view</h3>
        <button type="button" class="ab-dclose" aria-label="Close" data-close><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </header>
      <div class="ab-dbody">
        <div class="ab-dimg" id="ab-coll-dr-dimg"></div>
        <span class="ab-dtag" id="ab-coll-dr-dtag" hidden></span>
        <h3 id="ab-coll-dr-dname" class="ab-dname">—</h3>
        <div class="ab-dprices">
          <span class="ab-dprice" id="ab-coll-dr-dprice">₹—</span>
          <span class="ab-dold" id="ab-coll-dr-dold" hidden></span>
          <span class="ab-dpct" id="ab-coll-dr-dpct" hidden></span>
        </div>
        <p class="ab-ddesc" id="ab-coll-dr-ddesc">—</p>
        <div>
          <div class="ab-doption-label">Size</div>
          <div class="ab-doption-row">
            <button type="button" class="ab-doption" aria-pressed="false">XS</button>
            <button type="button" class="ab-doption" aria-pressed="true">S</button>
            <button type="button" class="ab-doption" aria-pressed="false">M</button>
            <button type="button" class="ab-doption" aria-pressed="false">L</button>
            <button type="button" class="ab-doption" aria-pressed="false">XL</button>
          </div>
        </div>
      </div>
      <footer class="ab-dfoot">
        <a class="ab-dadd" id="ab-coll-dr-dadd" href="#">Add to bag</a>
        <a class="ab-dview" id="ab-coll-dr-dview" href="#">View</a>
      </footer>
    </aside>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-dr');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-dr-grid');
      var dwrap = root.querySelector('#ab-coll-dr-dwrap');
      var dimg = root.querySelector('#ab-coll-dr-dimg');
      var dname = root.querySelector('#ab-coll-dr-dname');
      var dprice = root.querySelector('#ab-coll-dr-dprice');
      var dold = root.querySelector('#ab-coll-dr-dold');
      var dpct = root.querySelector('#ab-coll-dr-dpct');
      var dtag = root.querySelector('#ab-coll-dr-dtag');
      var ddesc = root.querySelector('#ab-coll-dr-ddesc');
      var dadd = root.querySelector('#ab-coll-dr-dadd');
      var dview = root.querySelector('#ab-coll-dr-dview');
      var sizeBtns = root.querySelectorAll('.ab-doption');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';

      var products = [];

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }
      grid.innerHTML = skel(8);

      function cardHTML(p, idx) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +     '<div class="ab-quick"><button class="ab-qbtn" type="button" data-qv="' + idx + '"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/></svg> Quick view</button></div>'
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + '</div>'
          +   '</div>'
          + '</article>';
      }

      function open(p) {
        var v = p.variants && p.variants[0]; if (!v) return;
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');

        dimg.innerHTML = img ? '<img src="' + img + '" alt="' + title + '">' : '';
        dname.innerHTML = title;
        dprice.textContent = fmt(price) || '₹—';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          dold.textContent = fmt(compare); dold.hidden = false;
          dpct.textContent = 'Save ' + d + '%'; dpct.hidden = false;
          dtag.textContent = '−' + d + '% Sale'; dtag.hidden = false;
        } else { dold.hidden = true; dpct.hidden = true; dtag.hidden = true; }

        var desc = (p.body_html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        ddesc.textContent = desc ? desc.slice(0, 200) + (desc.length > 200 ? '…' : '') : 'No description available.';

        dview.href = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        dadd.href = 'https://' + DOMAIN + '/cart/' + v.id + ':1';

        dwrap.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function close() {
        dwrap.classList.remove('open');
        document.body.style.overflow = '';
      }

      dwrap.addEventListener('click', function (e) { if (e.target.closest('[data-close]')) close(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && dwrap.classList.contains('open')) close(); });

      sizeBtns.forEach(function (b) {
        b.addEventListener('click', function () {
          sizeBtns.forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
          b.setAttribute('aria-pressed', 'true');
        });
      });

      grid.addEventListener('click', function (e) {
        var t = e.target.closest('[data-qv]');
        if (!t) return;
        e.preventDefault();
        var idx = parseInt(t.getAttribute('data-qv'), 10);
        var p = products[idx];
        if (p) open(p);
      });

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        grid.innerHTML = products.map(cardHTML).join('');
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
