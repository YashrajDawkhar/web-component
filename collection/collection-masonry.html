<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-mz" aria-labelledby="ab-coll-mz-title">
  <style>
    #ab-coll-mz,
    #ab-coll-mz *,
    #ab-coll-mz *::before,
    #ab-coll-mz *::after { box-sizing: border-box; }

    #ab-coll-mz {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-mz .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }
    #ab-coll-mz .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-mz .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-mz-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-mz .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    /* CSS columns masonry */
    #ab-coll-mz .ab-grid {
      column-count: 2;
      column-gap: var(--space-sm);
    }
    @media (min-width: 640px) { #ab-coll-mz .ab-grid { column-count: 3; column-gap: var(--space-md); } }
    @media (min-width: 1024px) { #ab-coll-mz .ab-grid { column-count: 4; } }

    #ab-coll-mz .ab-card {
      break-inside: avoid;
      margin-bottom: var(--space-lg);
      display: flex; flex-direction: column;
    }

    #ab-coll-mz .ab-media {
      position: relative; display: block; overflow: hidden;
      background: var(--color-surface-container);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-mz .ab-media img { width: 100%; height: auto; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-mz .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-mz .ab-card:hover .ab-media img { transform: scale(1.04); }

    #ab-coll-mz .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }

    #ab-coll-mz .ab-fav {
      position: absolute; top: var(--space-sm); right: var(--space-sm);
      width: 2rem; height: 2rem; display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-full); border: 1px solid var(--color-outline);
      background: color-mix(in srgb, var(--color-background) 75%, transparent);
      backdrop-filter: blur(8px); color: var(--color-on-surface); cursor: pointer;
    }
    #ab-coll-mz .ab-fav:hover, #ab-coll-mz .ab-fav.on { color: var(--color-primary); }
    #ab-coll-mz .ab-fav.on svg { fill: currentColor; }
    #ab-coll-mz .ab-fav svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    #ab-coll-mz .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-mz .ab-name { color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ab-coll-mz .ab-name:hover { color: var(--color-primary); }
    #ab-coll-mz .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-mz .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-mz .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }

    #ab-coll-mz .ab-skeleton {
      break-inside: avoid;
      margin-bottom: var(--space-lg);
      border-radius: var(--radius-lg);
      background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%);
      background-size: 200% 100%;
      animation: ab-shimmer 1.4s linear infinite;
    }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ab-coll-mz .ab-status { padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); column-span: all; }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Mosaic</span>
        <h2 id="ab-coll-mz-title">Sale picks</h2>
        <p class="ab-sub">A pinned mood board — tall, square, and wide.</p>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-mz-grid"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-mz');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-mz-grid');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';
      var ratios = [0.8, 1.1, 1.0, 1.4, 0.9, 1.2, 1.0, 1.5];

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) { var h = 200 + (i % 4) * 60; s += '<div class="ab-skeleton" aria-hidden="true" style="height:' + h + 'px"></div>'; } return s; }

      grid.innerHTML = skel(10);

      function cardHTML(p, i) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
        }
        var ratio = ratios[i % ratios.length];
        var styleAttr = 'aspect-ratio:' + ratio.toFixed(2);
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '" style="' + styleAttr + '">'
          +     tag
          +     '<button class="ab-fav" type="button" aria-label="Save" onclick="event.preventDefault();this.classList.toggle(\'on\');"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>'
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" style="aspect-ratio:' + ratio.toFixed(2) + ';object-fit:cover;height:auto" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + '</div>'
          +   '</div>'
          + '</article>';
      }

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        grid.innerHTML = products.map(cardHTML).join('');
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
