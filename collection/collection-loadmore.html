<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-lm" aria-labelledby="ab-coll-lm-title">
  <style>
    #ab-coll-lm,
    #ab-coll-lm *,
    #ab-coll-lm *::before,
    #ab-coll-lm *::after { box-sizing: border-box; }

    #ab-coll-lm {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }

    #ab-coll-lm .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }

    #ab-coll-lm .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-lm .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-lm-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-lm .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-lm .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-lm .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 960px) { #ab-coll-lm .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    #ab-coll-lm .ab-card { display: flex; flex-direction: column; min-width: 0; }
    #ab-coll-lm .ab-card.in { animation: ab-fadeIn .35s var(--ease-standard) both; }
    @keyframes ab-fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    #ab-coll-lm .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-lm .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-lm .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-lm .ab-card:hover .ab-media img { transform: scale(1.04); }
    #ab-coll-lm .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }

    #ab-coll-lm .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-lm .ab-name { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; }
    #ab-coll-lm .ab-name:hover { color: var(--color-primary); }
    #ab-coll-lm .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-lm .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-lm .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }
    #ab-coll-lm .ab-pct { color: var(--color-primary); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.04em; }

    #ab-coll-lm .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ab-coll-lm .ab-foot {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-sm);
      margin-top: var(--space-xl);
    }
    #ab-coll-lm .ab-progress {
      width: 100%; max-width: 16rem; height: 4px;
      background: var(--color-outline); border-radius: var(--radius-full); overflow: hidden;
    }
    #ab-coll-lm .ab-progress::after {
      content: ""; display: block; height: 100%;
      width: var(--ab-prog, 0%);
      background: var(--color-primary);
      transition: width var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-lm .ab-progress-text { font-size: 0.75rem; color: var(--color-on-surface-variant); font-variant-numeric: tabular-nums; }
    #ab-coll-lm .ab-progress-text strong { color: var(--color-on-surface); font-weight: var(--font-weight-bold); }

    #ab-coll-lm .ab-loadmore {
      padding: var(--space-sm) var(--space-lg);
      border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      font: inherit; font-size: 0.8125rem; font-weight: var(--font-weight-bold);
      letter-spacing: 0.04em; text-transform: uppercase;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-lm .ab-loadmore:hover { background: var(--color-on-surface); color: var(--color-background); border-color: var(--color-on-surface); }
    #ab-coll-lm .ab-loadmore:disabled { opacity: 0.4; cursor: not-allowed; }
    #ab-coll-lm .ab-loadmore:focus-visible { outline: var(--focus-ring-width) solid var(--focus-ring-color); outline-offset: 2px; }

    #ab-coll-lm .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Browse</span>
        <h2 id="ab-coll-lm-title">Sale picks</h2>
        <p class="ab-sub">Showing the first batch — load more as you scroll.</p>
      </div>
    </header>
    <div class="ab-grid" id="ab-coll-lm-grid"></div>
    <div class="ab-foot">
      <div class="ab-progress" aria-hidden="true"></div>
      <div class="ab-progress-text"><strong id="ab-coll-lm-shown">0</strong> of <strong id="ab-coll-lm-total">—</strong> shown</div>
      <button type="button" class="ab-loadmore" id="ab-coll-lm-btn" disabled>Load more</button>
    </div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-lm');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-lm-grid');
      var btn = root.querySelector('#ab-coll-lm-btn');
      var shownEl = root.querySelector('#ab-coll-lm-shown');
      var totalEl = root.querySelector('#ab-coll-lm-total');
      var progress = root.querySelector('.ab-progress');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';
      var BATCH = 8;

      var all = [];
      var shown = 0;

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }
      grid.innerHTML = skel(BATCH);

      function cardHTML(p) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '', pct = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
          pct = '<span class="ab-pct">Save ' + d + '%</span>';
        }
        return ''
          + '<article class="ab-card in">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + pct + '</div>'
          +   '</div>'
          + '</article>';
      }

      function update() {
        var pct = all.length ? (shown / all.length) * 100 : 0;
        progress.style.setProperty('--ab-prog', pct + '%');
        shownEl.textContent = shown;
        totalEl.textContent = all.length;
        btn.disabled = shown >= all.length;
        if (btn.disabled) btn.textContent = 'You\'ve seen it all';
      }

      function appendBatch() {
        var next = all.slice(shown, shown + BATCH);
        if (!next.length) return;
        var html = next.map(cardHTML).join('');
        grid.insertAdjacentHTML('beforeend', html);
        shown += next.length;
        update();
      }

      btn.addEventListener('click', appendBatch);

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; totalEl.textContent = '0'; return; }
        all = products;
        grid.innerHTML = '';
        appendBatch();
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
