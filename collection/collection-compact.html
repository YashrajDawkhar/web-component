<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-cmp" aria-labelledby="ab-coll-cmp-title">
  <style>
    #ab-coll-cmp,
    #ab-coll-cmp *,
    #ab-coll-cmp *::before,
    #ab-coll-cmp *::after { box-sizing: border-box; }

    #ab-coll-cmp {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }

    #ab-coll-cmp .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }

    #ab-coll-cmp .ab-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }

    #ab-coll-cmp .ab-eyebrow {
      display: inline-block;
      margin: 0 0 4px;
      font-size: 0.625rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    #ab-coll-cmp-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.01em;
      color: var(--color-on-background);
    }

    #ab-coll-cmp .ab-count {
      font-size: 0.75rem;
      color: var(--color-on-surface-variant);
      font-variant-numeric: tabular-nums;
    }

    #ab-coll-cmp .ab-count strong { color: var(--color-on-surface); font-weight: var(--font-weight-bold); }

    #ab-coll-cmp .ab-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-xs);
      row-gap: var(--space-md);
    }
    @media (min-width: 480px) { #ab-coll-cmp .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (min-width: 720px) { #ab-coll-cmp .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
    @media (min-width: 960px) { #ab-coll-cmp .ab-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); gap: var(--space-sm); } }

    #ab-coll-cmp .ab-card { display: flex; flex-direction: column; min-width: 0; }

    #ab-coll-cmp .ab-media {
      position: relative;
      display: block;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--color-surface-container);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-md);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }

    #ab-coll-cmp .ab-media img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 600ms var(--ease-standard);
    }

    #ab-coll-cmp .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-cmp .ab-card:hover .ab-media img { transform: scale(1.04); }

    #ab-coll-cmp .ab-tag {
      position: absolute;
      top: 6px; left: 6px;
      padding: 2px 5px;
      border-radius: var(--radius-sm);
      font-size: 0.5625rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
      background: var(--color-primary);
      color: var(--color-on-primary);
    }

    #ab-coll-cmp .ab-body { padding-top: 6px; }
    #ab-coll-cmp .ab-name {
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
      color: var(--color-on-surface); text-decoration: none;
      font-size: 0.75rem; font-weight: var(--font-weight-medium); line-height: 1.3;
    }
    #ab-coll-cmp .ab-name:hover { color: var(--color-primary); }

    #ab-coll-cmp .ab-prices {
      display: flex; align-items: baseline; gap: 4px;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }
    #ab-coll-cmp .ab-price { color: var(--color-on-surface); font-size: 0.75rem; font-weight: var(--font-weight-bold); }
    #ab-coll-cmp .ab-old { color: var(--color-on-surface-variant); font-size: 0.6875rem; text-decoration: line-through; }

    #ab-coll-cmp .ab-skeleton {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%);
      background-size: 200% 100%;
      animation: ab-shimmer 1.4s linear infinite;
    }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ab-coll-cmp .ab-status {
      grid-column: 1 / -1;
      padding: var(--space-xl) var(--space-md);
      text-align: center;
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
    }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Compact</span>
        <h2 id="ab-coll-cmp-title">Sale picks</h2>
      </div>
      <span class="ab-count" aria-live="polite"><strong>—</strong> products</span>
    </header>
    <div class="ab-grid" id="ab-coll-cmp-grid"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-cmp');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-cmp-grid');
      var countEl = root.querySelector('.ab-count strong');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }

      grid.innerHTML = skel(12);

      function cardHTML(p) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + '</div>'
          +   '</div>'
          + '</article>';
      }

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; countEl.textContent = '0'; return; }
        grid.innerHTML = products.map(cardHTML).join('');
        countEl.textContent = products.length;
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
