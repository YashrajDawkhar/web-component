<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-ls" aria-labelledby="ab-coll-ls-title">
  <style>
    #ab-coll-ls,
    #ab-coll-ls *,
    #ab-coll-ls *::before,
    #ab-coll-ls *::after { box-sizing: border-box; }

    #ab-coll-ls {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-ls .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }

    #ab-coll-ls .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-lg); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-ls .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-ls-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-ls .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-ls .ab-list { display: flex; flex-direction: column; }

    #ab-coll-ls .ab-row {
      display: grid;
      grid-template-columns: 7rem 1fr;
      gap: var(--space-md);
      padding: var(--space-md) 0;
      border-top: 1px solid var(--color-outline);
      align-items: start;
    }
    @media (min-width: 720px) {
      #ab-coll-ls .ab-row { grid-template-columns: 10rem 1fr auto; gap: var(--space-lg); padding: var(--space-lg) 0; align-items: center; }
    }
    #ab-coll-ls .ab-list .ab-row:last-child { border-bottom: 1px solid var(--color-outline); }

    #ab-coll-ls .ab-media {
      position: relative;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: var(--color-surface-container);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-md);
      display: block;
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-ls .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-ls .ab-row:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-ls .ab-row:hover .ab-media img { transform: scale(1.04); }

    #ab-coll-ls .ab-tag { position: absolute; top: 6px; left: 6px; padding: 2px 6px; background: var(--color-primary); color: var(--color-on-primary); border-radius: var(--radius-sm); font-size: 0.5625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.06em; text-transform: uppercase; line-height: 1; }

    #ab-coll-ls .ab-info { min-width: 0; display: flex; flex-direction: column; gap: var(--space-xs); }
    #ab-coll-ls .ab-cat {
      font-size: 0.6875rem; font-weight: var(--font-weight-bold);
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--color-on-surface-variant);
    }
    #ab-coll-ls .ab-name {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--color-on-background);
      text-decoration: none;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    #ab-coll-ls .ab-name:hover { color: var(--color-primary); }
    #ab-coll-ls .ab-desc {
      color: var(--color-on-surface-variant);
      font-size: var(--font-size-body-sm);
      line-height: var(--line-height-body);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    #ab-coll-ls .ab-meta {
      display: flex; gap: var(--space-md); flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--color-on-surface-variant);
    }
    #ab-coll-ls .ab-meta strong { color: var(--color-on-surface); font-weight: var(--font-weight-bold); }
    #ab-coll-ls .ab-swatches { display: inline-flex; gap: 4px; }
    #ab-coll-ls .ab-sw { width: 14px; height: 14px; border-radius: var(--radius-full); border: 1px solid var(--color-outline); }

    #ab-coll-ls .ab-side {
      display: flex; flex-direction: column; align-items: flex-end; gap: var(--space-sm);
      grid-column: 2 / -1;
    }
    @media (min-width: 720px) {
      #ab-coll-ls .ab-side { grid-column: auto; min-width: 12rem; }
    }
    #ab-coll-ls .ab-prices {
      display: flex; align-items: baseline; gap: var(--space-xs); font-variant-numeric: tabular-nums;
      flex-wrap: wrap;
    }
    #ab-coll-ls .ab-price { color: var(--color-on-surface); font-size: 1rem; font-weight: var(--font-weight-bold); }
    #ab-coll-ls .ab-old { color: var(--color-on-surface-variant); font-size: 0.8125rem; text-decoration: line-through; }
    #ab-coll-ls .ab-pct { color: var(--color-primary); font-size: 0.75rem; font-weight: var(--font-weight-bold); letter-spacing: 0.04em; }

    #ab-coll-ls .ab-actions { display: flex; gap: var(--space-xs); }
    #ab-coll-ls .ab-add {
      padding: var(--space-xs) var(--space-md);
      background: var(--color-on-surface); color: var(--color-background);
      border: none; border-radius: var(--radius-full);
      font: inherit; font-size: 0.8125rem; font-weight: var(--font-weight-bold);
      text-decoration: none; cursor: pointer;
      transition: background var(--duration-medium) var(--ease-standard), color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-ls .ab-add:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-ls .ab-fav {
      width: 2.25rem; height: 2.25rem; padding: 0;
      border: 1px solid var(--color-outline);
      background: var(--color-surface-container-lowest);
      color: var(--color-on-surface);
      border-radius: var(--radius-full);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #ab-coll-ls .ab-fav:hover, #ab-coll-ls .ab-fav.on { color: var(--color-primary); }
    #ab-coll-ls .ab-fav.on svg { fill: currentColor; }
    #ab-coll-ls .ab-fav svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    #ab-coll-ls .ab-skeleton {
      height: 9rem; border-radius: var(--radius-md); margin: var(--space-md) 0;
      background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%);
      background-size: 200% 100%;
      animation: ab-shimmer 1.4s linear infinite;
    }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #ab-coll-ls .ab-status { padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">List view</span>
        <h2 id="ab-coll-ls-title">Sale picks</h2>
        <p class="ab-sub">A scannable list — comfortable for long collections and detail-driven shoppers.</p>
      </div>
    </header>
    <div class="ab-list" id="ab-coll-ls-list"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-ls');
      if (!root) return;
      var list = root.querySelector('#ab-coll-ls-list');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';
      var swColors = ['#1a1a1a', '#f7f7f5', '#d8c8a9', '#5b6b3a', '#7fb1d0'];

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }

      list.innerHTML = skel(5);

      function rowHTML(p) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var bUrl = 'https://' + DOMAIN + '/cart/' + v.id + ':1';
        var available = p.available !== false;
        var desc = (p.body_html || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        desc = desc ? esc(desc.slice(0, 160) + (desc.length > 160 ? '…' : '')) : '';
        var category = p.product_type || (p.tags && p.tags.split ? p.tags.split(',')[0].trim() : '') || 'Collection';
        var tag = '', oldHtml = '', pct = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
          pct = '<span class="ab-pct">Save ' + d + '%</span>';
        }
        var swatchCount = ((p.images && p.images.length) || 1) % swColors.length || 3;
        var swHtml = '';
        for (var i = 0; i < Math.min(5, swatchCount + 1); i++) swHtml += '<span class="ab-sw" style="background:' + swColors[i % swColors.length] + '"></span>';

        return ''
          + '<div class="ab-row">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-info">'
          +     '<span class="ab-cat">' + esc(category) + '</span>'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     (desc ? '<p class="ab-desc">' + desc + '</p>' : '')
          +     '<div class="ab-meta">'
          +       '<span><strong>Sizes:</strong> XS · S · M · L · XL</span>'
          +       '<span class="ab-swatches" aria-label="Available colors">' + swHtml + '</span>'
          +     '</div>'
          +   '</div>'
          +   '<div class="ab-side">'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + pct + '</div>'
          +     '<div class="ab-actions">'
          +       '<button class="ab-fav" type="button" aria-label="Save" onclick="this.classList.toggle(\'on\');"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>'
          +       '<a class="ab-add" href="' + bUrl + '"' + (available ? '' : ' aria-disabled="true" tabindex="-1" style="opacity:0.4;pointer-events:none"') + '>' + (available ? 'Add to bag' : 'Sold out') + '</a>'
          +     '</div>'
          +   '</div>'
          + '</div>';
      }

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { list.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        list.innerHTML = products.map(rowHTML).join('');
      }).catch(function () { list.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
