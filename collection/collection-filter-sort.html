<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-fs" aria-labelledby="ab-coll-fs-title">
  <style>
    #ab-coll-fs,
    #ab-coll-fs *,
    #ab-coll-fs *::before,
    #ab-coll-fs *::after { box-sizing: border-box; }

    #ab-coll-fs {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }

    #ab-coll-fs .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }

    #ab-coll-fs .ab-head {
      display: flex; align-items: end; justify-content: space-between; gap: var(--space-md);
      margin-bottom: var(--space-md); flex-wrap: wrap;
      padding-bottom: var(--space-md); border-bottom: 1px solid var(--color-outline);
    }
    #ab-coll-fs .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-fs-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.5rem, 3vw, 2.25rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-fs .ab-sub { margin: var(--space-xs) 0 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    /* Layout shell */
    #ab-coll-fs .ab-shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
    }
    @media (min-width: 880px) {
      #ab-coll-fs .ab-shell { grid-template-columns: 16rem minmax(0, 1fr); gap: var(--space-xl); }
    }

    /* Sidebar */
    #ab-coll-fs .ab-side { min-width: 0; }
    #ab-coll-fs .ab-fgroup { padding: var(--space-md) 0; border-top: 1px solid var(--color-outline); }
    #ab-coll-fs .ab-fgroup:last-child { border-bottom: 1px solid var(--color-outline); }
    #ab-coll-fs .ab-fgroup summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      font-size: 0.75rem;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-on-surface);
    }
    #ab-coll-fs .ab-fgroup summary::-webkit-details-marker { display: none; }
    #ab-coll-fs .ab-fgroup summary::after {
      content: ""; width: 8px; height: 8px;
      border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor;
      transform: rotate(45deg); transition: transform var(--duration-medium) var(--ease-standard);
      color: var(--color-on-surface-variant);
    }
    #ab-coll-fs .ab-fgroup[open] summary::after { transform: rotate(-135deg); }
    #ab-coll-fs .ab-fbody { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: var(--space-xs); }

    #ab-coll-fs .ab-chk {
      display: flex; align-items: center; gap: var(--space-sm);
      font-size: var(--font-size-body-sm); color: var(--color-on-surface);
      cursor: pointer; padding: 4px 0;
    }
    #ab-coll-fs .ab-chk input { accent-color: var(--color-primary); width: 1rem; height: 1rem; }
    #ab-coll-fs .ab-chk .n { margin-left: auto; color: var(--color-on-surface-variant); font-size: 0.75rem; font-variant-numeric: tabular-nums; }

    #ab-coll-fs .ab-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    #ab-coll-fs .ab-sw {
      width: 1.5rem; height: 1.5rem; border-radius: var(--radius-full);
      border: 1px solid var(--color-outline); cursor: pointer;
      transition: outline var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-fs .ab-sw[aria-pressed="true"] { outline: 2px solid var(--color-primary); outline-offset: 2px; }

    #ab-coll-fs .ab-range { display: flex; gap: var(--space-xs); align-items: center; }
    #ab-coll-fs .ab-range input {
      width: 100%; padding: var(--space-xs) var(--space-sm);
      background: var(--color-input-background); color: var(--color-on-surface);
      border: 1px solid var(--color-input-border); border-radius: var(--radius-md);
      font: inherit; font-size: var(--font-size-body-sm);
    }
    #ab-coll-fs .ab-range span { color: var(--color-on-surface-variant); }

    /* Toolbar */
    #ab-coll-fs .ab-tools {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-sm); flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }
    #ab-coll-fs .ab-chips { display: flex; gap: var(--space-xs); flex-wrap: wrap; min-height: 2rem; align-items: center; }
    #ab-coll-fs .ab-chip {
      display: inline-flex; align-items: center; gap: var(--space-xs);
      padding: 4px 4px 4px 10px; border: 1px solid var(--color-outline);
      border-radius: var(--radius-full); font-size: 0.75rem; color: var(--color-on-surface);
      background: var(--color-surface-container-lowest);
    }
    #ab-coll-fs .ab-chip button {
      width: 1.25rem; height: 1.25rem; border-radius: var(--radius-full); border: none; padding: 0;
      background: var(--color-surface-container); color: var(--color-on-surface-variant);
      display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    }
    #ab-coll-fs .ab-chip button:hover { background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-fs .ab-chip button svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    #ab-coll-fs .ab-sort {
      display: inline-flex; align-items: center; gap: var(--space-xs);
      font-size: 0.75rem; color: var(--color-on-surface-variant);
    }
    #ab-coll-fs .ab-sort select {
      font: inherit; font-size: 0.75rem; color: var(--color-on-surface);
      background: var(--color-surface-container-lowest); border: 1px solid var(--color-outline);
      border-radius: var(--radius-md); padding: 6px 26px 6px 10px;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position: calc(100% - 14px) 50%, calc(100% - 10px) 50%;
      background-size: 4px 4px, 4px 4px;
      background-repeat: no-repeat;
    }
    #ab-coll-fs .ab-count { font-size: 0.75rem; color: var(--color-on-surface-variant); font-variant-numeric: tabular-nums; }
    #ab-coll-fs .ab-count strong { color: var(--color-on-surface); font-weight: var(--font-weight-bold); }

    /* Card grid (same DNA as default) */
    #ab-coll-fs .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-fs .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 1100px) { #ab-coll-fs .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    #ab-coll-fs .ab-card { display: flex; flex-direction: column; min-width: 0; }
    #ab-coll-fs .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-fs .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-fs .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-fs .ab-card:hover .ab-media img { transform: scale(1.04); }

    #ab-coll-fs .ab-tags { position: absolute; top: var(--space-sm); left: var(--space-sm); display: flex; gap: 4px; flex-wrap: wrap; }
    #ab-coll-fs .ab-tag { padding: 3px 7px; border-radius: var(--radius-sm); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; background: var(--color-primary); color: var(--color-on-primary); }
    #ab-coll-fs .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-fs .ab-name { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; }
    #ab-coll-fs .ab-name:hover { color: var(--color-primary); }
    #ab-coll-fs .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-fs .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-fs .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }
    #ab-coll-fs .ab-pct { color: var(--color-primary); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.04em; }

    #ab-coll-fs .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    #ab-coll-fs .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <div>
        <span class="ab-eyebrow">Shop</span>
        <h2 id="ab-coll-fs-title">Sale picks</h2>
        <p class="ab-sub">Refine by price, color, or availability — sort to surface what suits.</p>
      </div>
    </header>

    <div class="ab-shell">
      <aside class="ab-side" aria-label="Filters">
        <details class="ab-fgroup" open>
          <summary>Availability</summary>
          <div class="ab-fbody">
            <label class="ab-chk"><input type="checkbox" data-f="avail" value="in"> In stock <span class="n">—</span></label>
            <label class="ab-chk"><input type="checkbox" data-f="avail" value="out"> Sold out <span class="n">—</span></label>
          </div>
        </details>
        <details class="ab-fgroup" open>
          <summary>Discount</summary>
          <div class="ab-fbody">
            <label class="ab-chk"><input type="checkbox" data-f="disc" value="any"> On sale <span class="n">—</span></label>
            <label class="ab-chk"><input type="checkbox" data-f="disc" value="30"> 30% or more <span class="n">—</span></label>
            <label class="ab-chk"><input type="checkbox" data-f="disc" value="50"> 50% or more <span class="n">—</span></label>
          </div>
        </details>
        <details class="ab-fgroup">
          <summary>Price (₹)</summary>
          <div class="ab-fbody">
            <div class="ab-range">
              <input type="number" placeholder="Min" data-f="min" min="0">
              <span>—</span>
              <input type="number" placeholder="Max" data-f="max" min="0">
            </div>
          </div>
        </details>
        <details class="ab-fgroup">
          <summary>Color</summary>
          <div class="ab-fbody">
            <div class="ab-swatches">
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="Black" style="background:#1a1a1a"></button>
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="White" style="background:#f7f7f5"></button>
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="Sand" style="background:#d8c8a9"></button>
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="Olive" style="background:#5b6b3a"></button>
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="Burgundy" style="background:#6b1f2a"></button>
              <button class="ab-sw" type="button" aria-pressed="false" aria-label="Sky" style="background:#7fb1d0"></button>
            </div>
          </div>
        </details>
      </aside>

      <div>
        <div class="ab-tools">
          <div class="ab-chips" id="ab-coll-fs-chips" aria-live="polite"></div>
          <div style="display:flex;gap:var(--space-md);align-items:center">
            <span class="ab-count"><strong>—</strong> products</span>
            <label class="ab-sort">
              Sort
              <select id="ab-coll-fs-sort">
                <option value="featured">Featured</option>
                <option value="price-asc">Price: low to high</option>
                <option value="price-desc">Price: high to low</option>
                <option value="discount">Biggest discount</option>
                <option value="title">A → Z</option>
              </select>
            </label>
          </div>
        </div>
        <div class="ab-grid" id="ab-coll-fs-grid"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-fs');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-fs-grid');
      var chipsEl = root.querySelector('#ab-coll-fs-chips');
      var sortEl = root.querySelector('#ab-coll-fs-sort');
      var countEl = root.querySelector('.ab-count strong');
      var API = 'https://zigly.com/collections/sale/products.json';
      var DOMAIN = 'zigly.com';

      var allProducts = [];
      var filters = { avail: [], disc: [], min: null, max: null };

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }
      grid.innerHTML = skel(6);

      function info(p) {
        var v = p.variants && p.variants[0]; if (!v) return null;
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var disc = (compare && compare > price) ? Math.round(((compare - price) / compare) * 100) : 0;
        return { p: p, v: v, price: price, compare: compare, disc: disc, available: p.available !== false };
      }

      function cardHTML(it) {
        var p = it.p;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tags = '', oldHtml = '', pct = '';
        if (it.disc > 0) {
          tags = '<span class="ab-tag">−' + it.disc + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(it.compare) + '</span>';
          pct = '<span class="ab-pct">Save ' + it.disc + '%</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     '<div class="ab-tags">' + tags + '</div>'
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(it.price) || '₹—') + '</span>' + oldHtml + pct + '</div>'
          +   '</div>'
          + '</article>';
      }

      function applyFilters(items) {
        return items.filter(function (it) {
          if (filters.avail.length) {
            if (filters.avail.indexOf('in') !== -1 && !it.available) return false;
            if (filters.avail.length === 1 && filters.avail[0] === 'out' && it.available) return false;
          }
          if (filters.disc.length) {
            var min = Math.max.apply(null, filters.disc.map(function (x) { return x === 'any' ? 1 : parseInt(x, 10); }));
            if (it.disc < min) return false;
          }
          if (filters.min != null && it.price < filters.min) return false;
          if (filters.max != null && it.price > filters.max) return false;
          return true;
        });
      }

      function applySort(items) {
        var s = sortEl.value;
        var c = items.slice();
        if (s === 'price-asc') c.sort(function (a, b) { return a.price - b.price; });
        else if (s === 'price-desc') c.sort(function (a, b) { return b.price - a.price; });
        else if (s === 'discount') c.sort(function (a, b) { return b.disc - a.disc; });
        else if (s === 'title') c.sort(function (a, b) { return (a.p.title || '').localeCompare(b.p.title || ''); });
        return c;
      }

      function renderChips() {
        var chips = [];
        filters.avail.forEach(function (v) { chips.push({ k: 'avail', v: v, label: v === 'in' ? 'In stock' : 'Sold out' }); });
        filters.disc.forEach(function (v) { chips.push({ k: 'disc', v: v, label: v === 'any' ? 'On sale' : v + '%+ off' }); });
        if (filters.min != null) chips.push({ k: 'min', v: '', label: 'Min ₹' + filters.min });
        if (filters.max != null) chips.push({ k: 'max', v: '', label: 'Max ₹' + filters.max });
        chipsEl.innerHTML = chips.length
          ? chips.map(function (c) { return '<span class="ab-chip">' + esc(c.label) + '<button type="button" data-k="' + c.k + '" data-v="' + esc(c.v) + '" aria-label="Remove filter"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>'; }).join('')
          : '<span style="font-size:0.75rem;color:var(--color-on-surface-variant)">No filters applied</span>';
      }

      function render() {
        var items = applyFilters(allProducts);
        items = applySort(items);
        if (!items.length) { grid.innerHTML = '<div class="ab-status">No products match your filters.</div>'; }
        else { grid.innerHTML = items.map(cardHTML).join(''); }
        countEl.textContent = items.length;
        renderChips();
      }

      root.querySelectorAll('input[type="checkbox"][data-f]').forEach(function (input) {
        input.addEventListener('change', function () {
          var f = input.getAttribute('data-f');
          var val = input.value;
          var arr = filters[f];
          var i = arr.indexOf(val);
          if (input.checked && i === -1) arr.push(val);
          if (!input.checked && i !== -1) arr.splice(i, 1);
          render();
        });
      });

      root.querySelectorAll('input[type="number"][data-f]').forEach(function (input) {
        input.addEventListener('input', function () {
          var f = input.getAttribute('data-f');
          var val = input.value === '' ? null : parseFloat(input.value);
          filters[f] = Number.isFinite(val) ? val : null;
          render();
        });
      });

      sortEl.addEventListener('change', render);

      chipsEl.addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-k]');
        if (!btn) return;
        var k = btn.getAttribute('data-k');
        var v = btn.getAttribute('data-v');
        if (k === 'min' || k === 'max') {
          filters[k] = null;
          var input = root.querySelector('input[data-f="' + k + '"]'); if (input) input.value = '';
        } else {
          filters[k] = filters[k].filter(function (x) { return x !== v; });
          var input2 = root.querySelector('input[type="checkbox"][data-f="' + k + '"][value="' + v + '"]'); if (input2) input2.checked = false;
        }
        render();
      });

      root.querySelectorAll('.ab-sw').forEach(function (sw) {
        sw.addEventListener('click', function () {
          var on = sw.getAttribute('aria-pressed') === 'true';
          sw.setAttribute('aria-pressed', String(!on));
        });
      });

      fetch(API).then(function (r) { return r.json(); }).then(function (data) {
        var products = (data && data.products) ? data.products : [];
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; countEl.textContent = '0'; renderChips(); return; }
        allProducts = products.map(info).filter(Boolean);

        var inN = 0, outN = 0, onSale = 0, d30 = 0, d50 = 0;
        allProducts.forEach(function (it) {
          if (it.available) inN++; else outN++;
          if (it.disc > 0) onSale++;
          if (it.disc >= 30) d30++;
          if (it.disc >= 50) d50++;
        });
        var setN = function (sel, n) { var el = root.querySelector(sel); if (el) el.textContent = n; };
        setN('input[data-f="avail"][value="in"] + .n, label:has(input[data-f="avail"][value="in"]) .n', inN);
        setN('label:has(input[data-f="avail"][value="out"]) .n', outN);
        setN('label:has(input[data-f="disc"][value="any"]) .n', onSale);
        setN('label:has(input[data-f="disc"][value="30"]) .n', d30);
        setN('label:has(input[data-f="disc"][value="50"]) .n', d50);

        render();
      }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load products.</div>'; });
    })();
  </script>
</section>
