<link rel="stylesheet" href="../themes/supabase.css">
<section id="ab-coll-tb" aria-labelledby="ab-coll-tb-title">
  <style>
    #ab-coll-tb,
    #ab-coll-tb *,
    #ab-coll-tb *::before,
    #ab-coll-tb *::after { box-sizing: border-box; }

    #ab-coll-tb {
      width: 100%;
      padding: var(--space-section-y) var(--space-page-x);
      background: var(--color-background);
      color: var(--color-on-surface);
      font-family: var(--font-sans);
    }
    #ab-coll-tb .ab-wrap { max-width: var(--container-max-width); margin: 0 auto; }

    #ab-coll-tb .ab-head {
      text-align: center; margin-bottom: var(--space-md);
    }
    #ab-coll-tb .ab-eyebrow { display: inline-block; margin: 0 0 var(--space-xs); font-size: 0.6875rem; font-weight: var(--font-weight-bold); letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-primary); }
    #ab-coll-tb-title { margin: 0; font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: var(--font-weight-bold); letter-spacing: -0.02em; line-height: var(--line-height-tight); color: var(--color-on-background); }
    #ab-coll-tb .ab-sub { margin: var(--space-xs) auto 0; max-width: 40rem; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); line-height: var(--line-height-body); }

    #ab-coll-tb .ab-tabs {
      display: flex;
      gap: 0;
      justify-content: center;
      margin: var(--space-lg) 0 var(--space-md);
      border-bottom: 1px solid var(--color-outline);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #ab-coll-tb .ab-tabs::-webkit-scrollbar { display: none; }

    #ab-coll-tb .ab-tab {
      position: relative;
      padding: var(--space-sm) var(--space-md);
      border: none; background: transparent;
      font: inherit;
      font-size: 0.875rem;
      font-weight: var(--font-weight-medium);
      color: var(--color-on-surface-variant);
      cursor: pointer;
      white-space: nowrap;
      transition: color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-tb .ab-tab:hover { color: var(--color-on-surface); }
    #ab-coll-tb .ab-tab[aria-selected="true"] { color: var(--color-on-surface); font-weight: var(--font-weight-bold); }
    #ab-coll-tb .ab-tab[aria-selected="true"]::after {
      content: ""; position: absolute; left: var(--space-md); right: var(--space-md); bottom: -1px;
      height: 2px; background: var(--color-primary);
    }
    #ab-coll-tb .ab-tab .pill {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 1.25rem; height: 1.25rem; padding: 0 0.4rem;
      margin-left: 6px;
      border-radius: var(--radius-full);
      background: color-mix(in srgb, var(--color-on-surface) 8%, transparent);
      color: var(--color-on-surface-variant);
      font-size: 0.6875rem; font-weight: var(--font-weight-bold); line-height: 1;
    }
    #ab-coll-tb .ab-tab[aria-selected="true"] .pill { background: var(--color-primary); color: var(--color-on-primary); }

    /* Card grid (same DNA) */
    #ab-coll-tb .ab-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-sm); row-gap: var(--space-lg);
    }
    @media (min-width: 640px) { #ab-coll-tb .ab-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-md); } }
    @media (min-width: 960px) { #ab-coll-tb .ab-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }

    #ab-coll-tb .ab-card { display: flex; flex-direction: column; min-width: 0; animation: ab-fadeIn .35s var(--ease-standard) both; }
    @keyframes ab-fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    #ab-coll-tb .ab-media {
      position: relative; display: block; aspect-ratio: 4/5; overflow: hidden;
      background: var(--color-surface-container); border: 1px solid var(--color-outline); border-radius: var(--radius-lg);
      transition: border-color var(--duration-medium) var(--ease-standard);
    }
    #ab-coll-tb .ab-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 600ms var(--ease-standard); }
    #ab-coll-tb .ab-card:hover .ab-media { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-outline)); }
    #ab-coll-tb .ab-card:hover .ab-media img { transform: scale(1.04); }
    #ab-coll-tb .ab-tag { position: absolute; top: var(--space-sm); left: var(--space-sm); padding: 3px 7px; border-radius: var(--radius-sm); background: var(--color-primary); color: var(--color-on-primary); font-size: 0.625rem; font-weight: var(--font-weight-bold); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }
    #ab-coll-tb .ab-body { padding-top: var(--space-sm); display: flex; flex-direction: column; gap: 4px; }
    #ab-coll-tb .ab-name { color: var(--color-on-surface); text-decoration: none; font-size: var(--font-size-body-sm); font-weight: var(--font-weight-medium); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ab-coll-tb .ab-name:hover { color: var(--color-primary); }
    #ab-coll-tb .ab-prices { display: flex; align-items: baseline; gap: var(--space-xs); margin-top: 2px; font-variant-numeric: tabular-nums; }
    #ab-coll-tb .ab-price { color: var(--color-on-surface); font-size: var(--font-size-body-sm); font-weight: var(--font-weight-bold); }
    #ab-coll-tb .ab-old { color: var(--color-on-surface-variant); font-size: 0.75rem; text-decoration: line-through; }

    #ab-coll-tb .ab-skeleton { aspect-ratio: 4/5; border-radius: var(--radius-lg); background: linear-gradient(90deg, var(--color-surface-container) 0%, var(--color-surface-container-high) 50%, var(--color-surface-container) 100%); background-size: 200% 100%; animation: ab-shimmer 1.4s linear infinite; }
    @keyframes ab-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #ab-coll-tb .ab-status { grid-column: 1 / -1; padding: var(--space-xl) var(--space-md); text-align: center; color: var(--color-on-surface-variant); font-size: var(--font-size-body-sm); }
  </style>

  <div class="ab-wrap">
    <header class="ab-head">
      <span class="ab-eyebrow">Browse</span>
      <h2 id="ab-coll-tb-title">Shop by collection</h2>
      <p class="ab-sub">Switch between live collections — same shelf, fresh angles.</p>
    </header>

    <div class="ab-tabs" role="tablist" aria-label="Collections">
      <button class="ab-tab" type="button" role="tab" aria-selected="true" data-key="sale" data-api="https://zigly.com/collections/sale/products.json">Sale <span class="pill" data-pill="sale">—</span></button>
      <button class="ab-tab" type="button" role="tab" aria-selected="false" data-key="new" data-api="https://zigly.com/collections/new/products.json">New <span class="pill" data-pill="new">—</span></button>
      <button class="ab-tab" type="button" role="tab" aria-selected="false" data-key="bestsellers" data-api="https://zigly.com/collections/best-sellers/products.json">Best sellers <span class="pill" data-pill="bestsellers">—</span></button>
    </div>

    <div class="ab-grid" id="ab-coll-tb-grid"></div>
  </div>

  <script>
    (function () {
      var root = document.getElementById('ab-coll-tb');
      if (!root) return;
      var grid = root.querySelector('#ab-coll-tb-grid');
      var tabs = root.querySelectorAll('.ab-tab');
      var DOMAIN = 'zigly.com';
      var cache = {};

      function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
      function fmt(v) { var n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? '₹' + n.toLocaleString('en-IN') : ''; }
      function skel(n) { var s=''; for (var i=0;i<n;i++) s += '<div class="ab-skeleton" aria-hidden="true"></div>'; return s; }

      function cardHTML(p) {
        var v = p.variants && p.variants[0]; if (!v) return '';
        var price = parseFloat(v.price);
        var compare = v.compare_at_price ? parseFloat(v.compare_at_price) : null;
        var img = p.images && p.images[0] ? (p.images[0].src || '') : '';
        if (img && img.indexOf('//') === 0) img = 'https:' + img;
        var title = esc(p.title || '');
        var pUrl = 'https://' + DOMAIN + '/products/' + (p.handle || '');
        var tag = '', oldHtml = '';
        if (compare && compare > price) {
          var d = Math.round(((compare - price) / compare) * 100);
          tag = '<span class="ab-tag">−' + d + '%</span>';
          oldHtml = '<span class="ab-old">' + fmt(compare) + '</span>';
        }
        return ''
          + '<article class="ab-card">'
          +   '<a class="ab-media" href="' + pUrl + '" aria-label="View ' + title + '">'
          +     tag
          +     (img ? '<img src="' + img + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.removeAttribute(\'src\');">' : '')
          +   '</a>'
          +   '<div class="ab-body">'
          +     '<a class="ab-name" href="' + pUrl + '">' + title + '</a>'
          +     '<div class="ab-prices"><span class="ab-price">' + (fmt(price) || '₹—') + '</span>' + oldHtml + '</div>'
          +   '</div>'
          + '</article>';
      }

      function load(key, api) {
        if (cache[key]) {
          render(cache[key], key);
          return Promise.resolve();
        }
        grid.innerHTML = skel(8);
        return fetch(api).then(function (r) { return r.json(); }).then(function (data) {
          var products = (data && data.products) ? data.products : [];
          cache[key] = products;
          render(products, key);
        }).catch(function () { grid.innerHTML = '<div class="ab-status">Couldn\'t load this collection.</div>'; });
      }

      function render(products, key) {
        var pill = root.querySelector('[data-pill="' + key + '"]');
        if (pill) pill.textContent = products.length;
        if (!products.length) { grid.innerHTML = '<div class="ab-status">No products found</div>'; return; }
        grid.innerHTML = products.map(cardHTML).join('');
      }

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.setAttribute('aria-selected', 'false'); });
          tab.setAttribute('aria-selected', 'true');
          load(tab.getAttribute('data-key'), tab.getAttribute('data-api'));
        });
      });

      // Pre-fetch counts for all tabs
      tabs.forEach(function (t) {
        fetch(t.getAttribute('data-api')).then(function (r) { return r.json(); }).then(function (d) {
          var products = (d && d.products) ? d.products : [];
          cache[t.getAttribute('data-key')] = products;
          var pill = root.querySelector('[data-pill="' + t.getAttribute('data-key') + '"]');
          if (pill) pill.textContent = products.length;
          if (t.getAttribute('aria-selected') === 'true') render(products, t.getAttribute('data-key'));
        }).catch(function () {});
      });
    })();
  </script>
</section>
